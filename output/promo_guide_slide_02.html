<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>LangCard Studio — Guide Slide 02</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background-color: #0D1B2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 100px 120px;
  }

  .canvas::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(255, 213, 79, 0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .bottom-line {
    position: absolute;
    bottom: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .slide-number {
    position: absolute;
    top: 88px;
    right: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 213, 79, 0.45);
    letter-spacing: 0.08em;
  }

  /* Content type badge */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 213, 79, 0.1);
    border: 1px solid rgba(255, 213, 79, 0.3);
    border-radius: 100px;
    padding: 10px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 500;
    color: #FFD54F;
    letter-spacing: 0.04em;
    margin-bottom: 32px;
    z-index: 1;
  }

  .header {
    margin-bottom: 40px;
    z-index: 1;
  }

  .slide-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .slide-subtitle {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 30px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
  }

  /* Mini expression cards */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex: 1;
    justify-content: center;
    z-index: 1;
  }

  .mini-card {
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 213, 79, 0.18);
    border-radius: 12px;
    padding: 22px 28px;
  }

  .card-flag {
    font-size: 38px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-body {
    flex: 1;
  }

  .card-expression {
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: #FFD54F;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .card-meaning {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="slide-number">02 / 05</div>

  <div class="type-badge">📋 표현 카드</div>

  <div class="header">
    <h2 class="slide-title">표현 카드, 이렇게<br>생겼어요</h2>
    <p class="slide-subtitle">원어 표현 + 발음 + 한국어 의미. 한 장에 다 담았습니다.</p>
  </div>

  <div class="cards-grid">
    <div class="mini-card">
      <span class="card-flag">🇺🇸</span>
      <div class="card-body">
        <p class="card-expression">"Are you free this weekend?"</p>
        <p class="card-meaning">주말에 시간 있어요?</p>
      </div>
    </div>

    <div class="mini-card">
      <span class="card-flag">🇨🇳</span>
      <div class="card-body">
        <p class="card-expression">"老板，再来一碗！"</p>
        <p class="card-meaning">사장님, 한 그릇 더요!</p>
      </div>
    </div>

    <div class="mini-card">
      <span class="card-flag">🇯🇵</span>
      <div class="card-body">
        <p class="card-expression">"おすすめは何ですか？"</p>
        <p class="card-meaning">추천 메뉴가 뭐예요?</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
