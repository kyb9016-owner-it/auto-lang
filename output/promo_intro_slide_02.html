<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>LangCard Studio — Slide 02</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background-color: #0D1B2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 100px 120px;
  }

  .canvas::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255, 213, 79, 0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .bottom-line {
    position: absolute;
    bottom: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .slide-number {
    position: absolute;
    top: 88px;
    right: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 213, 79, 0.45);
    letter-spacing: 0.08em;
  }

  .header {
    margin-bottom: 64px;
    z-index: 1;
  }

  .question-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 56px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .question-title .accent {
    color: #FFD54F;
  }

  .lang-list {
    display: flex;
    flex-direction: column;
    gap: 36px;
    z-index: 1;
    flex: 1;
    justify-content: center;
  }

  .lang-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 28px 36px;
    border-left: 3px solid rgba(255, 213, 79, 0.5);
    background: rgba(255, 255, 255, 0.04);
    border-radius: 0 8px 8px 0;
  }

  .lang-label {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .flag {
    font-size: 36px;
    line-height: 1;
  }

  .lang-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #FFD54F;
    letter-spacing: 0.01em;
  }

  .lang-desc {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 34px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
    padding-left: 50px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="slide-number">02 / 05</div>

  <div class="header">
    <h2 class="question-title">
      왜 <span class="accent">3개 국어</span>냐고요?
    </h2>
  </div>

  <div class="lang-list">
    <div class="lang-item">
      <div class="lang-label">
        <span class="flag">🇺🇸</span>
        <span class="lang-name">영어</span>
      </div>
      <p class="lang-desc">전 세계 어디서든 통하는 언어.<br>여행지에서, 카페에서, 바로 꺼내 쓰는 표현.</p>
    </div>

    <div class="lang-item">
      <div class="lang-label">
        <span class="flag">🇨🇳</span>
        <span class="lang-name">중국어</span>
      </div>
      <p class="lang-desc">드라마 대사가 귀에 들리는 그 순간.<br>생각보다 쉽게, 생각보다 재미있게.</p>
    </div>

    <div class="lang-item">
      <div class="lang-label">
        <span class="flag">🇯🇵</span>
        <span class="lang-name">일본어</span>
      </div>
      <p class="lang-desc">일본 여행이 완전히 달라지는 언어.<br>한 마디면 현지인 반응이 달라져요.</p>
    </div>
  </div>
</div>
</body>
</html>
