<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>LangCard Studio — Slide 04</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background-color: #0D1B2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 100px 120px;
  }

  .canvas::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, rgba(255, 213, 79, 0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .bottom-line {
    position: absolute;
    bottom: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .slide-number {
    position: absolute;
    top: 88px;
    right: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 213, 79, 0.45);
    letter-spacing: 0.08em;
  }

  .header {
    margin-bottom: 60px;
    z-index: 1;
  }

  .slide-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .slide-title .accent {
    color: #FFD54F;
  }

  .topics-grid {
    display: flex;
    flex-direction: column;
    gap: 32px;
    flex: 1;
    justify-content: center;
    z-index: 1;
  }

  .topic-item {
    display: flex;
    align-items: flex-start;
    gap: 28px;
  }

  .topic-icon-wrap {
    width: 76px;
    height: 76px;
    background: rgba(255, 213, 79, 0.12);
    border: 1px solid rgba(255, 213, 79, 0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 36px;
  }

  .topic-text {
    flex: 1;
    padding-top: 6px;
  }

  .topic-name {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: #FFD54F;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .topic-desc {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 32px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="slide-number">04 / 05</div>

  <div class="header">
    <h2 class="slide-title">
      매일 이런 주제로<br>
      <span class="accent">만나요.</span>
    </h2>
  </div>

  <div class="topics-grid">
    <div class="topic-item">
      <div class="topic-icon-wrap">👋</div>
      <div class="topic-text">
        <p class="topic-name">인사 &amp; 소개</p>
        <p class="topic-desc">첫 만남에서 자연스럽게.</p>
      </div>
    </div>

    <div class="topic-item">
      <div class="topic-icon-wrap">☕</div>
      <div class="topic-text">
        <p class="topic-name">카페 &amp; 식당</p>
        <p class="topic-desc">주문부터 대화까지, 한 번에.</p>
      </div>
    </div>

    <div class="topic-item">
      <div class="topic-icon-wrap">✈️</div>
      <div class="topic-text">
        <p class="topic-name">여행 &amp; 쇼핑</p>
        <p class="topic-desc">현지에서 진짜 쓰는 문장들.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
