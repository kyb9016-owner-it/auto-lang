<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>LangCard Studio — Slide 03</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background-color: #0D1B2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 100px 120px;
  }

  .canvas::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(225deg, rgba(255, 213, 79, 0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .bottom-line {
    position: absolute;
    bottom: 72px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: rgba(255, 213, 79, 0.25);
  }

  .slide-number {
    position: absolute;
    top: 88px;
    right: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 213, 79, 0.45);
    letter-spacing: 0.08em;
  }

  .header {
    margin-bottom: 52px;
    z-index: 1;
  }

  .slide-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .slide-title .accent {
    color: #FFD54F;
  }

  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 28px;
    flex: 1;
    justify-content: center;
    z-index: 1;
  }

  /* Mini card preview */
  .mini-card {
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 213, 79, 0.2);
    border-radius: 12px;
    padding: 24px 32px;
  }

  .card-flag {
    font-size: 40px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-body {
    flex: 1;
  }

  .card-expression {
    font-family: 'DM Sans', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: #FFD54F;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .card-meaning {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 30px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="slide-number">03 / 05</div>

  <div class="header">
    <h2 class="slide-title">
      오늘 배울 표현,<br>
      <span class="accent">미리 볼까요?</span>
    </h2>
  </div>

  <div class="cards-grid">
    <div class="mini-card">
      <span class="card-flag">🇺🇸</span>
      <div class="card-body">
        <p class="card-expression">"Are you new here?"</p>
        <p class="card-meaning">처음 오셨어요?</p>
      </div>
    </div>

    <div class="mini-card">
      <span class="card-flag">🇨🇳</span>
      <div class="card-body">
        <p class="card-expression">"你结婚了吗？"</p>
        <p class="card-meaning">결혼하셨어요?</p>
      </div>
    </div>

    <div class="mini-card">
      <span class="card-flag">🇯🇵</span>
      <div class="card-body">
        <p class="card-expression">"名前、なんて呼べばいい？"</p>
        <p class="card-meaning">이름, 뭐라고 부르면 돼요?</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
