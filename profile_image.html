<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LangCard Studio — Profile Image</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 28px;
    font-family: 'Segoe UI', sans-serif;
  }

  .label {
    color: #666;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── 메인 원형 프로필 600×600 ─────────────── */
  .frame {
    width: 600px;
    height: 600px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow:
      0 0 0 3px rgba(168,85,247,0.6),
      0 0 60px rgba(168,85,247,0.4),
      0 0 120px rgba(59,130,246,0.2);
    flex-shrink: 0;
  }

  .card {
    width: 100%;
    height: 100%;
    background: linear-gradient(150deg, #ff6ec7 0%, #a855f7 52%, #3b82f6 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* 도트 격자 (카드와 동일) */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  /* 중앙 흰색 글로우 */
  .glow {
    position: absolute;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* 콘텐츠 래퍼 */
  .center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* 언어 뱃지 row */
  .lang-row {
    display: flex;
    gap: 10px;
  }
  .lang-pill {
    background: rgba(255,255,255,0.22);
    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 22px;
    padding: 5px 18px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* LC 로고 */
  .logo-lc {
    font-size: 130px;
    font-weight: 900;
    letter-spacing: -6px;
    line-height: 1;
    color: #fff;
    text-shadow:
      0 2px 20px rgba(0,0,0,0.3),
      0 0 60px rgba(255,255,255,0.3);
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  /* LANGCARD 서브 */
  .logo-sub {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    margin-top: -8px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.25);
  }

  /* 구분 점 */
  .dots-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 2px;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.6); }
  .dot.big { width: 7px; height: 7px; background: rgba(255,255,255,0.9); }

  /* tagline */
  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }

  /* ── 작은 인스타 미리보기 ───────────────── */
  .mini-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .mini-circle {
    width: 86px; height: 86px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 2.5px rgba(168,85,247,0.7), 0 4px 20px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  /* 같은 카드 스타일, 스케일다운 */
  .mini-inner {
    width: 600px; height: 600px;
    background: linear-gradient(150deg, #ff6ec7 0%, #a855f7 52%, #3b82f6 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    position: relative;
    transform: scale(0.1433);
    transform-origin: top left;
  }
  .mini-inner::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .mini-center {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
  }
  .mini-lang-row { display: flex; gap: 10px; }
  .mini-pill {
    background: rgba(255,255,255,0.22);
    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 22px;
    padding: 5px 18px;
    font-size: 22px; font-weight: 700; color: #fff;
  }
  .mini-lc {
    font-size: 130px; font-weight: 900; letter-spacing: -6px;
    color: #fff; font-family: 'Georgia', serif; line-height: 1;
  }
  .mini-sub {
    font-size: 20px; font-weight: 700; letter-spacing: 8px;
    color: rgba(255,255,255,0.85); margin-top: -8px;
  }
  .mini-tag {
    font-size: 15px; color: rgba(255,255,255,0.7); letter-spacing: 2px;
  }
</style>
</head>
<body>

<p class="label">Profile Image · 600 × 600</p>

<div class="frame">
  <div class="card">
    <div class="glow"></div>

    <div class="center">
      <div class="logo-lc">LC</div>
      <div class="logo-sub">LangCard Studio</div>
    </div>
  </div>
</div>

<p class="label">Instagram 실제 표시 크기</p>

<!-- 인스타 프로필 아이콘 크기 미리보기 -->
<div class="mini-wrap">
  <div class="mini-circle">
    <div class="mini-inner">
      <div class="mini-center">
        <div class="mini-lc">LC</div>
        <div class="mini-sub">LangCard Studio</div>
      </div>
    </div>
  </div>
  <p style="color:#555; font-size:11px;">@langcard.studio</p>
</div>

</body>
</html>
