name: LangCard Studio — Auto Post

on:
  # schedule 비활성화 — 실 운영은 dispatch(kong-main) → worker(sns-worker) 경로 사용
  # - cron: "0 23 * * *"   # 08:00 KST
  # - cron: "0 3 * * *"    # 12:00 KST
  # - cron: "0 11 * * *"   # 20:00 KST
  workflow_dispatch:
    inputs:
      slot:
        description: "시간대 선택"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - lunch
          - evening
      topic:
        description: "주제 강제 지정 (비워두면 슬롯 기반 자동)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - greetings
          - cafe
          - travel
          - slang
      dry_run:
        description: "Dry run (카드 생성만, 업로드 안 함)"
        required: false
        default: "false"
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system packages (fonts + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-color-emoji fonts-noto-cjk ffmpeg

      - name: Determine time slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if   [ "$HOUR" = "23" ]; then echo "slot=morning"  >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then echo "slot=lunch"    >> $GITHUB_OUTPUT
            else                          echo "slot=evening"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run LangCard pipeline
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_URL:             ${{ secrets.CLOUDINARY_URL }}
          INSTAGRAM_ACCESS_TOKEN:     ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID:      ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          TOPIC="${{ github.event.inputs.topic }}"
          CMD="python main.py --slot ${{ steps.slot.outputs.slot }}"
          if [ -n "$TOPIC" ]; then CMD="$CMD --topic $TOPIC"; fi
          if [ "$DRY" = "true" ]; then CMD="$CMD --dry-run"; fi
          $CMD

      - name: Commit updated history
        run: |
          git config user.email "bot@langcard.studio"
          git config user.name  "LangCard Bot"
          git add history.json
          git diff --staged --quiet || \
            git commit -m "chore: update expression history [skip ci]" && \
            git push
